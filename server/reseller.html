<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HEXTRA - Reseller</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#180909;--panel:#2a1010;--line:#522323;--text:#fff0f0;--muted:#d2a4a4;--muted2:#a47474;--accent:#e03a3a;--green:#61efab;--yellow:#ffcf70;--red:#ff7b9a;--radius:18px;--sans:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',ui-monospace,monospace;--shadow:0 26px 72px rgba(0,0,0,.34)}
html,body{height:100%}
body{background:radial-gradient(circle at 10% 14%, rgba(224,58,58,.08), transparent 24%),radial-gradient(circle at 90% 10%, rgba(150,28,28,.08), transparent 26%),linear-gradient(180deg,#160707 0%,#180909 100%);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#24395a;border-radius:999px}
#app{display:none}
.shell{width:min(1240px,100%);margin:0 auto;padding:28px 24px 42px}
.topbar{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:18px;align-items:end;margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid rgba(255,255,255,.06)}
.eyebrow{display:inline-flex;align-items:center;gap:10px;padding:7px 12px;border-radius:999px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);color:#ff9d9d;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
.eyebrow::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 18px rgba(224,58,58,.75)}
.headline{margin-top:16px;font-size:40px;line-height:1;font-weight:800;letter-spacing:-.05em}
.subline{margin-top:10px;color:var(--muted);font-size:14px;line-height:1.7;max-width:680px}
.user-info{display:flex;align-items:center;gap:12px}
.user-badge{display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:18px;box-shadow:var(--shadow)}
.avatar{width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--accent),#ff6b6b);color:#180909;font-weight:800;font-size:15px}
.uname{font-size:14px;font-weight:700}.urole{font-size:11px;color:var(--muted2);letter-spacing:.14em;text-transform:uppercase;margin-top:2px}
.logout{padding:13px 16px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--text);font-size:13px;font-weight:700;cursor:pointer;transition:border-color .16s ease, transform .16s ease, background .16s ease}
.logout:hover{border-color:rgba(255,123,154,.24);background:rgba(255,123,154,.12);color:var(--red);transform:translateY(-1px)}
.stats-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:18px}
.s-card{background:linear-gradient(180deg,rgba(16,27,47,.96),rgba(11,20,35,.98));border:1px solid rgba(255,255,255,.06);border-radius:22px;padding:20px;box-shadow:var(--shadow)}
.s-val{font-family:var(--mono);font-size:28px;font-weight:700;color:var(--text)}.s-card.s-credits .s-val{color:var(--green)}.s-label{margin-top:10px;color:var(--muted2);font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase}
.layout{display:grid;grid-template-columns:minmax(0,1fr) 420px;gap:18px;align-items:start}
.card{background:linear-gradient(180deg,rgba(16,27,47,.96),rgba(11,20,35,.98));border:1px solid rgba(255,255,255,.06);border-radius:24px;padding:24px;box-shadow:var(--shadow)}
.card h3{margin-bottom:18px;color:#ff9d9d;font-size:12px;font-weight:800;letter-spacing:.14em;text-transform:uppercase}
.quick-picks{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.quick-pick{padding:10px 14px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid var(--line);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;transition:border-color .16s ease, color .16s ease, background .16s ease, transform .16s ease}
.quick-pick:hover{border-color:rgba(224,58,58,.3);color:var(--text);transform:translateY(-1px)}
.quick-pick.active{background:rgba(224,58,58,.12);color:#ffc1c1;border-color:rgba(224,58,58,.32)}
.form-row{display:grid;grid-template-columns:minmax(0,1fr) 150px auto;gap:12px;align-items:end}
.fg label{display:block;margin-bottom:8px;color:#8fa7cb;font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}
.fg select,.fg input{width:100%;padding:14px 15px;border-radius:16px;background:rgba(9,17,31,.72);border:1px solid var(--line);color:var(--text);font-size:14px;outline:none;transition:border-color .16s ease, box-shadow .16s ease}
.fg select:focus,.fg input:focus{border-color:rgba(224,58,58,.48);box-shadow:0 0 0 4px rgba(224,58,58,.12)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:14px 18px;border-radius:16px;border:1px solid transparent;font-size:13px;font-weight:800;font-family:var(--sans);cursor:pointer;transition:transform .16s ease,background .16s ease,border-color .16s ease}
.btn:hover{transform:translateY(-1px)}
.btn-primary{background:linear-gradient(135deg,var(--accent),#ff6b6b);color:#180909;box-shadow:0 14px 30px rgba(224,58,58,.18)}
.cost-info{margin-top:12px;min-height:18px;color:var(--muted);font-size:13px}.cost-info b{color:var(--yellow)}
.gen-result{margin-top:18px;padding:18px;border-radius:18px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);display:none}
.gen-result.show{display:block}
.gen-result-label{color:#8fa7cb;font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px}
.gen-key-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border-radius:14px;background:rgba(9,17,31,.72);border:1px solid var(--line);margin-bottom:8px}
.gen-key-txt{color:#ff9d9d;font-family:var(--mono);font-size:12px;overflow-wrap:anywhere}
.table-wrap{overflow:auto;max-height:720px}
table{width:100%;border-collapse:separate;border-spacing:0}
thead th{position:sticky;top:0;z-index:1;padding:12px 14px;text-align:left;background:#0f1a2d;border-bottom:1px solid rgba(255,255,255,.06);color:var(--muted2);font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}
tbody td{padding:14px;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px}tbody tr:hover td{background:rgba(255,255,255,.02)}
.key-val{color:#ff9d9d;font-family:var(--mono);font-size:12px;font-weight:700;cursor:pointer}
.badge{display:inline-flex;align-items:center;justify-content:center;padding:5px 10px;border-radius:999px;font-size:11px;font-weight:800}
.badge-free{background:rgba(97,239,171,.12);color:var(--green)}.badge-bound{background:rgba(255,207,112,.12);color:var(--yellow)}.badge-expired{background:rgba(255,123,154,.12);color:var(--red)}
.act{padding:8px 12px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.02);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;transition:border-color .16s ease,color .16s ease,background .16s ease}
.act:hover{border-color:rgba(224,58,58,.3);color:var(--text)}.act:disabled{opacity:.45;cursor:not-allowed}.act-cd{font-family:var(--mono);color:var(--yellow);font-size:10px}
#toast{position:fixed;right:22px;bottom:22px;z-index:100;min-width:220px;padding:14px 16px;border-radius:16px;background:linear-gradient(180deg,rgba(16,27,47,.98),rgba(11,20,35,.98));border:1px solid rgba(255,255,255,.08);box-shadow:var(--shadow);color:var(--text);font-size:13px;transform:translateY(18px);opacity:0;transition:transform .2s ease, opacity .2s ease}
#toast.show{transform:translateY(0);opacity:1}#toast.ok{border-color:rgba(97,239,171,.26);color:var(--green)}#toast.err{border-color:rgba(255,123,154,.26);color:var(--red)}
@media (max-width:1020px){.layout{grid-template-columns:1fr}}
@media (max-width:780px){.topbar{grid-template-columns:1fr}.user-info{justify-content:flex-start;flex-wrap:wrap}.stats-row{grid-template-columns:repeat(2,minmax(0,1fr))}.form-row{grid-template-columns:1fr}}
@media (max-width:560px){.shell{padding:20px 16px 34px}.headline{font-size:30px}.stats-row{grid-template-columns:1fr}.card{padding:18px}}
</style>
<style id="aurora-glass-reseller">
:root{
  --glass-panel:rgba(10,16,32,.58);
  --glass-strong:rgba(9,15,28,.78);
  --glass-line:rgba(255,255,255,.12);
  --glass-line-soft:rgba(255,255,255,.08);
  --glass-shadow:0 34px 120px rgba(0,0,0,.42);
  --mx:50vw;--my:50vh;--px:50%;--py:50%;
}
body{
  position:relative;
  background:
    radial-gradient(circle at 16% 16%, rgba(109,97,255,.14), transparent 24%),
    radial-gradient(circle at 84% 12%, rgba(224,58,58,.18), transparent 24%),
    radial-gradient(circle at 50% 88%, rgba(95,240,167,.10), transparent 26%),
    linear-gradient(145deg,#050816 0%,#091120 46%,#0f172a 100%);
}
body::after{
  content:"";
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  opacity:.75;
  mix-blend-mode:screen;
  background:radial-gradient(circle at var(--px) var(--py), rgba(255,255,255,.09), transparent 22%);
}
.blob{
  position:fixed;
  border-radius:50%;
  filter:blur(44px);
  pointer-events:none;
  opacity:.52;
  mix-blend-mode:screen;
  animation:auroraDrift 16s ease-in-out infinite;
  z-index:0;
}
.blob.a{width:40vmax;height:40vmax;left:-10vmax;top:-15vmax;background:rgba(109,97,255,.22)}
.blob.b{width:34vmax;height:34vmax;right:-10vmax;top:10vmax;background:rgba(224,58,58,.20);animation-delay:-5s}
.blob.c{width:26vmax;height:26vmax;left:18vmax;bottom:-12vmax;background:rgba(95,240,167,.12);animation-delay:-9s}
.cursor-glow{
  position:fixed;
  left:0;
  top:0;
  width:520px;
  height:520px;
  border-radius:50%;
  pointer-events:none;
  z-index:1;
  opacity:.5;
  transform:translate(var(--mx), var(--my)) translate(-50%, -50%);
  background:radial-gradient(circle, rgba(103,232,249,.18), rgba(109,97,255,.10) 35%, transparent 72%);
  filter:blur(22px);
  mix-blend-mode:screen;
  transition:opacity .3s ease;
}
.noise{
  position:fixed;
  inset:0;
  z-index:1;
  pointer-events:none;
  opacity:.08;
  background-image:
    linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
  background-size:24px 24px;
  mask-image:radial-gradient(circle at center, #000 18%, transparent 82%);
}
#app,.shell{position:relative;z-index:2}
.shell{
  border:1px solid var(--glass-line);
  border-radius:32px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.03) 22%, rgba(255,255,255,.01) 60%),
    linear-gradient(180deg, rgba(11,18,36,.72), rgba(7,13,26,.86));
  box-shadow:var(--glass-shadow), inset 0 1px 0 rgba(255,255,255,.08);
  backdrop-filter:blur(22px) saturate(145%);
}
.topbar,.user-badge,.s-card,.card,.quick-pick,.gen-result,.gen-key-row,.table-wrap,.logout,.act,.fg select,.fg input{
  position:relative;
  border-color:var(--glass-line-soft);
  backdrop-filter:blur(16px) saturate(135%);
}
.topbar{
  border-bottom-color:rgba(255,255,255,.08);
}
.eyebrow,.user-badge,.s-card,.card,.quick-pick,.gen-result,.gen-key-row,.table-wrap{
  background:
    linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.02) 22%, rgba(255,255,255,.01) 64%),
    rgba(8,13,26,.36);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
}
.eyebrow,.user-badge,.card,.s-card{
  border:1px solid var(--glass-line-soft);
}
.s-card,.card{
  overflow:hidden;
}
.s-card::before,.card::before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:linear-gradient(180deg, rgba(255,255,255,.10), transparent 42%);
}
.subline,.urole,.cost-info,.badge-free,.badge-bound,.badge-expired{position:relative;z-index:1}
.headline,.s-val{letter-spacing:-.06em}
.fg select,.fg input{
  background:
    linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02)),
    rgba(8,13,26,.56);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
}
.fg select:focus,.fg input:focus{border-color:rgba(103,232,249,.48);box-shadow:0 0 0 4px rgba(103,232,249,.12)}
.btn-primary,.logout,.act{
  overflow:hidden;
}
.btn-primary{
  background:linear-gradient(135deg, rgba(160,28,28,.96), rgba(224,58,58,.92));
  box-shadow:0 18px 36px rgba(224,58,58,.16);
}
.btn-primary::before,.logout::before,.act::before{
  content:"";
  position:absolute;
  inset:-80% -20%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.24), transparent);
  transform:rotate(18deg) translateX(-70%);
  animation:buttonSweep 4s ease-in-out infinite;
}
.logout,.act,.quick-pick{
  background:
    linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02)),
    rgba(8,13,26,.40);
}
.logout:hover,.act:hover,.quick-pick:hover{border-color:rgba(255,255,255,.14)}
.table-wrap{
  border:1px solid var(--glass-line-soft);
  border-radius:20px;
}
thead th{
  background:rgba(10,18,34,.82);
  backdrop-filter:blur(12px);
}
tbody tr:hover td{background:rgba(255,255,255,.03)}
tbody td{border-bottom-color:rgba(255,255,255,.06)}
@keyframes auroraDrift{
  0%,100%{transform:translate3d(0,0,0) scale(1)}
  50%{transform:translate3d(4%,-4%,0) scale(1.08)}
}
@keyframes buttonSweep{
  0%,100%{transform:rotate(18deg) translateX(-70%)}
  50%{transform:rotate(18deg) translateX(70%)}
}
@media (max-width:700px){
  .cursor-glow{display:none}
}
@media (prefers-reduced-motion:reduce){
  .blob,.btn-primary::before,.logout::before,.act::before{animation:none !important}
}
</style>
<style id="liquid-glass-reseller">

}
.topbar{border-bottom-color:rgba(255,255,255,.16) !important}
.eyebrow,.user-badge,.s-card,.card,.table-wrap{border:1px solid var(--ios-line-soft) !important}
.headline,.uname,.s-val,.card h3,.key-val{color:var(--ios-text) !important}
.subline,.urole,.s-label,.cost-info,.fg label,.file-info,tbody td,.act,.quick-pick{color:var(--ios-muted) !important}
.eyebrow{

}

}

</style>
<style id="minimal-reseller">
:root{
  --min-bg:#0b0d12;
  --min-bg2:#11151c;
  --min-panel:rgba(255,255,255,.04);
  --min-panel-strong:rgba(255,255,255,.06);
  --min-line:rgba(255,255,255,.08);
  --min-text:#f5f7fb;
  --min-muted:#98a2b3;
  --min-shadow:0 20px 60px rgba(0,0,0,.28);
}
body{
  font-family:"SF Pro Text","SF Pro Display",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif !important;
  background:linear-gradient(180deg,#0b0d12 0%,#11151c 52%,#0d1016 100%) !important;
  color:var(--min-text) !important;
}
.blob,.cursor-glow,.noise{display:none !important}
.shell{
  border:1px solid var(--min-line) !important;
  border-radius:30px !important;
  background:rgba(15,18,24,.84) !important;
  box-shadow:var(--min-shadow) !important;
  backdrop-filter:blur(20px) !important;
}
.topbar,.user-badge,.s-card,.card,.quick-pick,.gen-result,.gen-key-row,.table-wrap,.logout,.act,.fg select,.fg input,.btn-primary,#toast{
  border:1px solid var(--min-line) !important;
  background:var(--min-panel) !important;
  box-shadow:none !important;
  backdrop-filter:blur(18px) !important;
}
.btn-primary::before,.logout::before,.act::before{display:none !important}
.topbar{
  border-bottom:1px solid var(--min-line) !important;
  padding-bottom:20px !important;
}
.headline,.uname,.s-val,.card h3,.key-val{color:var(--min-text) !important}
.subline,.urole,.s-label,.cost-info,.fg label,.file-info,.act,.quick-pick,.cost-info,.badge-free,.badge-bound,.badge-expired{color:var(--min-muted) !important}
.eyebrow{
  border:1px solid var(--min-line) !important;
  background:transparent !important;
  color:var(--min-muted) !important;

<body>
<div class="blob a"></div>
<div class="blob b"></div>
<div class="blob c"></div>
<div class="cursor-glow" id="cursorGlow"></div>
<div class="noise"></div>
<div id="app"><div class="shell">
  <div class="topbar">
    <div>
      <div class="eyebrow">Reseller Workspace</div>
      <div class="headline">License Operations</div>
      <div class="subline">Generate keys, monitor activations, and handle customer resets from one focused dashboard.</div>
    </div>
    <div class="user-info">
      <div class="user-badge"><div class="avatar" id="r-av">?</div><div><div class="uname" id="r-name"></div><div class="urole">Reseller</div></div></div>
      <button class="logout" onclick="App.logout()">Abmelden</button>
    </div>
  </div>
  <div class="stats-row">
    <div class="s-card s-credits"><div class="s-val" id="s-credits">0</div><div class="s-label">Credits</div></div>
    <div class="s-card"><div class="s-val" id="s-keys">0</div><div class="s-label">Keys</div></div>
    <div class="s-card"><div class="s-val" id="s-active">0</div><div class="s-label">Aktiv</div></div>
    <div class="s-card"><div class="s-val" id="s-free">0</div><div class="s-label">Frei</div></div>
  </div>
  <div class="layout">
    <div class="card">
      <h3>Meine Keys</h3>
      <div class="table-wrap"><table><thead><tr><th>Key</th><th>Tage</th><th>Status</th><th>HWID</th><th>Aktionen</th></tr></thead><tbody id="keys-tbl"></tbody></table></div>
    </div>
    <div class="card">
      <h3>Keys generieren</h3>
      <div class="quick-picks" id="count-picks">
        <button class="quick-pick active" type="button" onclick="App.setCount(1)">1 Key</button>
        <button class="quick-pick" type="button" onclick="App.setCount(3)">3 Keys</button>
        <button class="quick-pick" type="button" onclick="App.setCount(5)">5 Keys</button>
        <button class="quick-pick" type="button" onclick="App.setCount(10)">10 Keys</button>
      </div>
      <div class="form-row">
        <div class="fg"><label>Laufzeit</label><select id="gen-days" onchange="App.updateCost()"><option value="">W&auml;hlen...</option></select></div>
        <div class="fg"><label>Anzahl</label><input type="number" id="gen-count" value="1" min="1" max="20" oninput="App.updateCost()"></div>
        <button class="btn btn-primary" onclick="App.genKeys()">Generieren</button>
      </div>
      <div class="cost-info" id="cost-info"></div>
      <div class="gen-result" id="gen-result"><div class="gen-result-label">Generierte Keys</div><div id="gen-list"></div></div>
    </div>
  </div>
</div></div>
<div id="toast"></div>
<script>
(function() {
  function getCookie(n){var c=document.cookie.split(';');for(var i=0;i<c.length;i++){var p=c[i].trim().split('=');if(p[0]===n)return decodeURIComponent(p.slice(1).join('='))}return''}
  function delCookie(n){document.cookie=n+'=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/;SameSite=Strict'}
  function getPathRid(){var m=window.location.pathname.match(/^\/shop\/([a-zA-Z0-9_-]+)/);return m?decodeURIComponent(m[1]).toLowerCase():''}
  var CURRENT_RID=getPathRid();
  if(!CURRENT_RID){window.location.href='/login';return}
  var USER="";
  var INFO={},PRICES={},KEYS=[],toastT,cdInterval;
  var $=function(id){return document.getElementById(id)};
  function api(url,body,cb){body.reseller_id=CURRENT_RID;fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(function(r){return r.json().then(function(d){return{status:r.status,data:d}})}).then(function(res){var d=res.data||{};if(d.success){if(cb)cb(d)}else if((d.message||'').indexOf('Login')!==-1||res.status===401){window.location.href='/login?r='+encodeURIComponent(CURRENT_RID)}else{toast(d.message||'Fehler','err')}}).catch(function(){toast('Server-Fehler','err')})}
  function toast(m,t){var e=$('toast');e.textContent=m;e.className='show'+(t?' '+t:'');clearTimeout(toastT);toastT=setTimeout(function(){e.className=''},2600)}
  function boot(){fetch('/auth/me',{credentials:'same-origin'}).then(function(r){if(!r.ok)throw 0;return r.json()}).then(function(d){var rid='';if(d&&d.success&&d.role==='reseller'&&d.reseller_id)rid=d.reseller_id;else if(d&&d.success&&d.role==='user'&&d.access_reseller&&d.reseller_id)rid=d.reseller_id;else throw 0;USER=d.username||'';if(rid!==CURRENT_RID){window.location.href='/shop/'+encodeURIComponent(rid);return}api('/reseller/info',{},function(info){INFO=info;PRICES=info.credit_prices||{};$('app').style.display='block';$('r-name').textContent=info.name||USER;$('r-av').textContent=(info.name||USER).charAt(0).toUpperCase();$('s-credits').textContent=info.credits||0;buildDaysSelect();updateCost();loadKeys()})}).catch(function(){window.location.href='/login?r='+encodeURIComponent(CURRENT_RID)})}
function logout(){fetch('/auth/logout',{method:'POST'}).finally(function(){['hextra_token','hextra_role','hextra_user','hextra_name','hextra_reseller_id','defy_token','defy_role','defy_user','defy_name','defy_reseller_id'].forEach(delCookie);window.location.href='/login?r='+encodeURIComponent(CURRENT_RID)})}
  function updStats(){var ac=0,fr=0;KEYS.forEach(function(k){if(k.hwid)ac++;else fr++});$('s-keys').textContent=KEYS.length;$('s-active').textContent=ac;$('s-free').textContent=fr}
  function buildDaysSelect(){var s=$('gen-days');var labels={'1':'1 Tag','3':'3 Tage','7':'1 Woche','14':'2 Wochen','30':'1 Monat','90':'3 Monate','365':'1 Jahr'};s.innerHTML='<option value="">W\u00e4hlen...</option>'+Object.keys(PRICES).sort(function(a,b){return parseInt(a)-parseInt(b)}).map(function(d){var l=labels[d]||(d+' Tage');return'<option value="'+d+'">'+l+' - '+PRICES[d]+' Credits</option>'}).join('')}
  function updateCost(){var d=$('gen-days').value,c=parseInt($('gen-count').value)||1;var el=$('cost-info');updateCountPicks(c);if(!d){el.innerHTML='';return}var cost=(PRICES[d]||0)*c,cr=INFO.credits||0;el.innerHTML='Kosten: <b>'+cost+' Credits</b>'+(cost>cr?' <span style="color:var(--red)">- nicht genug</span>':' - '+cr+' vorhanden')}
  function updateCountPicks(value){Array.prototype.forEach.call(document.querySelectorAll('.quick-pick'),function(btn){btn.classList.toggle('active',parseInt(btn.textContent,10)===value)})}
  function setCount(value){$('gen-count').value=value;updateCost()}
  function genKeys(){var d=$('gen-days').value,c=parseInt($('gen-count').value)||1;if(!d){toast('Laufzeit w\u00e4hlen','err');return}api('/reseller/genkey',{days:parseInt(d),count:c},function(r){$('gen-list').innerHTML=r.keys.map(function(k){return'<div class="gen-key-row"><span class="gen-key-txt">'+k+'</span><button class="act" onclick="App.copyKey(\''+k+'\')">Copy</button></div>'}).join('');$('gen-result').style.display='block';$('gen-result').classList.add('show');navigator.clipboard.writeText(r.keys.join('\n')).catch(function(){});INFO.credits=r.credits_remaining;$('s-credits').textContent=r.credits_remaining;toast(r.keys.length+' Keys generiert','ok');updateCost();loadKeys();$('gen-result').scrollIntoView({behavior:'smooth',block:'nearest'})})}
  function loadKeys(){api('/reseller/keys',{},function(d){KEYS=d.keys||[];updStats();renderKeys()})}
  function cdRemaining(lastReset){if(!lastReset)return 0;try{var since=(Date.now()-new Date(lastReset).getTime())/1000;return Math.max(0,Math.ceil(86400-since))}catch(e){return 0}}
  function fmtCd(secs){var h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=secs%60;return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')}
  function renderKeys(){var t=$('keys-tbl');if(!KEYS.length){t.innerHTML='<tr><td colspan="5" style="text-align:center;color:var(--muted2);padding:26px">Noch keine Keys generiert</td></tr>';return}t.innerHTML=KEYS.map(function(k){var badge=k.expired?'<span class="badge badge-expired">Abgelaufen</span>':k.hwid?'<span class="badge badge-bound">Aktiv</span>':'<span class="badge badge-free">Frei</span>';var hw=k.hwid?'<span style="font-size:11px;color:var(--muted);font-family:var(--mono)">'+k.hwid.substring(0,12)+'...</span>':'-';var cd=cdRemaining(k.last_reset);var resetBtn='';if(k.hwid){if(cd>0){resetBtn='<button class="act" disabled>Reset <span class="act-cd" id="cd-'+k.key+'">'+fmtCd(cd)+'</span></button>'}else{resetBtn='<button class="act" onclick="App.resetKey(\''+k.key+'\')">Reset</button>'}}return'<tr><td><span class="key-val" onclick="App.copyKey(\''+k.key+'\')">'+k.key+'</span></td><td style="color:var(--muted)">'+(k.days?(k.days+'d'):'-')+'</td><td>'+badge+'</td><td>'+hw+'</td><td><button class="act" onclick="App.copyKey(\''+k.key+'\')">Copy</button> '+resetBtn+'</td></tr>'}).join('');startCdTick()}
  function startCdTick(){if(cdInterval)clearInterval(cdInterval);cdInterval=setInterval(function(){var allDone=true;KEYS.forEach(function(k){var el=document.getElementById('cd-'+k.key);if(!el)return;var secs=cdRemaining(k.last_reset);if(secs<=0){loadKeys();clearInterval(cdInterval);return}el.textContent=fmtCd(secs);allDone=false});if(allDone)clearInterval(cdInterval)},1000)}
  function copyKey(k){navigator.clipboard.writeText(k).then(function(){toast(k+' kopiert','ok')})}
  function resetKey(k){if(!confirm('HWID von '+k+' zur\u00fccksetzen?\n\nDanach erst wieder in 24 h m\u00f6glich.'))return;api('/reseller/resetkey',{key:k},function(d){var entry=KEYS.find(function(x){return x.key===k});if(entry){entry.hwid='';entry.activated='';entry.last_reset=d.last_reset}renderKeys();updStats();toast('HWID zur\u00fcckgesetzt','ok')})}
  document.addEventListener('keydown',function(e){if(e.ctrlKey&&e.key==='Enter'){e.preventDefault();genKeys()}});
  window.App={logout:logout,updateCost:updateCost,genKeys:genKeys,copyKey:copyKey,resetKey:resetKey,setCount:setCount};
  boot();
})();
</script>
<script>
(function(){
  var root=document.documentElement;
  var glow=document.getElementById('cursorGlow');
  if(!glow)return;
  window.addEventListener('pointermove',function(e){
    root.style.setProperty('--mx',e.clientX+'px');
    root.style.setProperty('--my',e.clientY+'px');
    root.style.setProperty('--px',(e.clientX/window.innerWidth*100)+'%');
    root.style.setProperty('--py',(e.clientY/window.innerHeight*100)+'%');
    glow.style.opacity='1';
  });
  window.addEventListener('pointerleave',function(){glow.style.opacity='.5';});
})();
</script>
</body>
